{% extends "base.html" %}
{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #f1f8e9, #e3f2fd);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh; /* full viewport height */
    }

    .form-container {
        width: 400px;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        text-align: center;
    }

    h2 {
        color: #1976d2;
        margin-bottom: 20px;
    }

    input[type="text"] {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
        transition: border-color 0.3s ease;
    }

    input[type="text"]:focus {
        border-color: #1976d2;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    button:hover {
        background: #0d47a1;
    }
</style>

<div class="form-container">
    <h2>Add New Booking</h2>
    <form method="POST">
        <input type="text" name="passenger_name" placeholder="Passenger Name" required>
        <input type="text" name="bus_number" placeholder="Bus Number" required>
        <input type="text" name="seat_number" placeholder="Seat Number" required>
        <input type="text" name="date" placeholder="Date (DD-MM-YYYY)" required>
        <button type="submit">Add Booking</button>
    </form>
</div>
{% endblock %}
