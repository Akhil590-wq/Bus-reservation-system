{% extends "base.html" %}
{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #f9f9f9, #e3f2fd);
        margin: 0;
        padding: 20px;
    }

    h2 {
        color: #1976d2;
        text-align: center;
        margin-bottom: 20px;
    }

    a {
        text-decoration: none;
        color: #1976d2;
        font-weight: bold;
    }

    a:hover {
        color: #0d47a1;
    }

    .add-btn {
        display: inline-block;
        background: #1976d2;
        color: white;
        padding: 10px 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        transition: background 0.3s ease;
    }

    .add-btn:hover {
        background: #0d47a1;
    }

    ul {
        list-style: none;
        padding: 0;
        max-width: 600px;
        margin: auto;
    }

    li {
        background: white;
        margin: 10px 0;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .booking-info {
        font-size: 16px;
        color: #333;
    }

    .update-link {
        background: #ff9800;
        color: white;
        padding: 6px 12px;
        border-radius: 5px;
        transition: background 0.3s ease;
    }

    .update-link:hover {
        background: #e65100;
    }
</style>

<a href="/add" class="add-btn">➕ Add New Booking</a>
<h2>All Bookings</h2>
<ul>
    {% for booking in bookings %}
        <li>
            <span class="booking-info">
                {{ booking.passenger_name }} - Bus {{ booking.bus_number }} - Seat {{ booking.seat_number }} - Date {{ booking.date }}
            </span>
            <a href="/update/{{ booking.id }}" class="update-link">Update</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
