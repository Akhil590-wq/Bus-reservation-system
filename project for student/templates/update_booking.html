{% extends "base.html" %}
{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #f1f8e9, #e3f2fd);
        margin: 0;
        padding: 20px;
    }

    form {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    input[type="text"] {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
        transition: border-color 0.3s ease;
    }

    input[type="text"]:focus {
        border-color: #1976d2;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    button:hover {
        background: #0d47a1;
    }

    h2 {
        text-align: center;
        color: #1976d2;
        margin-bottom: 20px;
    }
</style>

<h2>Update Booking</h2>
<form method="POST">
    <input type="text" name="passenger_name" value="{{ booking.passenger_name }}" required>
    <input type="text" name="bus_number" value="{{ booking.bus_number }}" required>
    <input type="text" name="seat_number" value="{{ booking.seat_number }}" required>
    <input type="text" name="date" value="{{ booking.date }}" required>
    <button type="submit">Update Booking</button>
</form>
{% endblock %}
